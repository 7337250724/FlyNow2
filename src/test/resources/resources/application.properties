spring.application.name=FlyNow

spring.datasource.url=jdbc:mysql://localhost:3306/flynow_db_new?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Batch fetching to prevent N+1 queries
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# Enable batch fetching for collections
spring.jpa.properties.hibernate.default_batch_fetch_size=20

server.port  = 8080



spring.thymeleaf.cache=false
# Thymeleaf prefix and suffix (default values, but explicit for clarity)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html


# Disable welcome page - let controller handle root path
spring.web.resources.add-mappings=true
# Don't look for index.html in static folder
spring.web.resources.static-locations=classpath:/static/

