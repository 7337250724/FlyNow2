<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Fly Now - Booking Success</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700,800,900" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .success-container {
            max-width: 600px;
            background: #fff;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }

        .success-container h2 {
            color: #f15d30;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .booking-reference {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .btn-primary {
            background: #f15d30;
            border-color: #f15d30;
            padding: 12px 40px;
        }

        .btn-primary:hover {
            background: #d94c25;
            border-color: #d94c25;
        }
    </style>
</head>

<body>
    <div class="success-container">
        <div class="success-icon">
            <i class="fa fa-check-circle"></i>
        </div>
        <h2>Booking Successful!</h2>
        <p>Thank you for booking with Fly Now Travel Agency.</p>
        <div class="booking-reference">
            Booking Reference: <strong th:text="${bookingReference}">HTL-XXXXXXXX</strong>
        </div>
        <p>We have sent a confirmation email with your booking details.</p>
        <a href="/hotels" class="btn btn-primary mt-4">Browse More Hotels</a>
    </div>
</body>

</html>
