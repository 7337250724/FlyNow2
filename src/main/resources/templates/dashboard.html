<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Fly Now - Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700,800,900" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(26, 26, 26, 0.95) !important;
            backdrop-filter: blur(10px);
        }

        .dashboard-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 100%;
            margin-top: 80px;
        }

        .welcome-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-header h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .welcome-header p {
            color: #666;
            font-size: 16px;
        }

        .user-info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            color: #fff;
            margin-bottom: 30px;
        }

        .user-info-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 14px;
            opacity: 0.8;
            font-weight: 500;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-action {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary-action {
            background: #667eea;
            color: #fff;
        }

        .btn-primary-action:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: #fff;
            text-decoration: none;
        }

        .btn-secondary-action {
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary-action:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            text-decoration: none;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar bg-dark ftco-navbar-light" id="ftco-navbar">
        <div class="container">
            <a class="navbar-brand" href="/">Fly Now<span>Travel Agency</span></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#ftco-nav"
                aria-controls="ftco-nav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="oi oi-menu"></span> Menu
            </button>

            <div class="collapse navbar-collapse" id="ftco-nav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="/packages" class="nav-link">Packages</a></li>
                    <li class="nav-item"><a href="/hotels" class="nav-link">Hotels</a></li>
                    <li class="nav-item"><a href="/reviews/view" class="nav-link">Reviews</a></li>
                    <li class="nav-item"><a href="/logout" class="nav-link">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="welcome-header">
            <div class="icon-circle">
                <i class="fa fa-user"></i>
            </div>
            <h1>Welcome Back!</h1>
            <p>Your Account Information</p>
        </div>

        <div class="user-info-card">
            <h3><i class="fa fa-info-circle mr-2"></i>Login Details</h3>
            
            <div class="info-row">
                <span class="info-label">Username:</span>
                <span class="info-value" th:text="${user.username}">username</span>
            </div>
            
            <div class="info-row" th:if="${user.fullName != null and !user.fullName.isEmpty()}">
                <span class="info-label">Full Name:</span>
                <span class="info-value" th:text="${user.fullName}">Full Name</span>
            </div>
            
            <div class="info-row" th:if="${user.email != null and !user.email.isEmpty()}">
                <span class="info-label">Email:</span>
                <span class="info-value" th:text="${user.email}">email@example.com</span>
            </div>
            
            <div class="info-row">
                <span class="info-label">Account Status:</span>
                <span class="info-value">
                    <i class="fa fa-check-circle mr-1"></i>Active
                </span>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/packages" class="btn-action btn-primary-action">
                <i class="fa fa-suitcase mr-2"></i>View Packages
            </a>
            <a href="/logout" class="btn-action btn-secondary-action">
                <i class="fa fa-sign-out mr-2"></i>Logout
            </a>
        </div>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

</body>

</html>
